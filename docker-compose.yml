version: '3.8'

services:
  db:
    image: postgres:15
    container_name: carbnb-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: carbnb_admin
    ports:
      # Host 5433 -> container 5432. Host port 5433 avoids collision with
      # a native Postgres that may already be bound to 5432 on Windows.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
